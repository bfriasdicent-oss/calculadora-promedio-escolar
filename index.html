<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculadora de promedio escolar gratis. Calcula tu promedio de notas al instante.">
  <title>Calculadora de Promedio Escolar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
  <h1>📚 Calculadora de Promedio Escolar</h1>
    <p>Ingresa tus notas y calcula tu promedio al instante</p>
  </header>

  <main>
    <div id="materias-container">
      <div class="materia">
        <input type="text" placeholder="Materia (ej: Matemáticas)" class="nombre-materia">
        <input type="number" placeholder="Nota (0-100)" class="nota" min="0" max="100">
      </div>
    </div>

    <div class="botones">
      <button id="agregar">+ Agregar Materia</button>
      <button id="calcular">Calcular Promedio</button>
    </div>

    <div id="resultado" class="oculto">
      <h2>Tu promedio es: <span id="promedio-valor"></span></h2>
      <p id="estado"></p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
